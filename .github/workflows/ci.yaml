name: CI Pipeline

on:
  push:
    branches: ["feature/**", "main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check test coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=pipeline --cov-report=term-missing --cov-fail-under=70

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

      - name: Lint code
        run: |
          pip install flake8
          flake8 pipeline/ tests/ dags/ config/ --max-line-length=120 --ignore=E265,E302,E303,E305,E231,E225,E271,W291,W292,W293,F401,F811,F821
